# render.yaml
# SafeYouth AI Backend Deployment Configuration
# This file configures your application on Render.com

services:
  - type: web
    name: safeyouth-backend
    runtime: python
    repo: https://github.com/Dotcom560/safeyouth-backend  # Updated with your actual repo
    plan: free
    region: oregon  # Changed to match your database region (Oregon)
    branch: main
    
    # Build Configuration
    buildCommand: |
  echo "🚀 Starting SafeYouth AI Build Process..."
  # Python version is now controlled by runtime.txt
  echo "📦 Installing dependencies..."
  pip install --upgrade pip
  pip install -r requirements.txt
  python manage.py migrate --settings=safeyouth_api.settings_production
  python manage.py collectstatic --noinput --settings=safeyouth_api.settings_production
      
      # Create superuser automatically (if not exists)
      echo "👑 Creating superuser..."
      python manage.py shell --settings=safeyouth_api.settings_production << EOF
from django.contrib.auth import get_user_model
User = get_user_model()
if not User.objects.filter(username='admin').exists():
    User.objects.create_superuser('admin', 'admin@safeyouth.com', 'SafeYouthAdmin2025!')
    print('✅ Superuser created successfully')
else:
    print('✅ Superuser already exists')
EOF
      
      # Collect static files
      echo "📁 Collecting static files..."
      python manage.py collectstatic --noinput --settings=safeyouth_api.settings_production
      
      echo "✅ Build completed successfully!"
    
    # Start Command
    startCommand: gunicorn safeyouth_api.wsgi:application --settings=safeyouth_api.settings_production --workers=2 --threads=4 --timeout=120
    
    # Auto-scaling (free tier limits)
    scaling:
      minInstances: 0  # Scales to zero when inactive (free tier)
      maxInstances: 1   # Free tier limit
    
    # Health Check Configuration
    healthCheckPath: /health/
    
    # Environment Variables
    envVars:
      # ============================================
      # DJANGO CORE SETTINGS
      # ============================================
      - key: DJANGO_SETTINGS_MODULE
        value: safeyouth_api.settings_production
      
      - key: DJANGO_SECRET_KEY
        generateValue: true
      
      - key: DEBUG
        value: False
      
      - key: ALLOWED_HOSTS
        value: safeyouth-backend.onrender.com,localhost,127.0.0.1
      
      - key: CSRF_TRUSTED_ORIGINS
        value: https://safeyouth-backend.onrender.com,https://*.onrender.com
      
      - key: CORS_ALLOWED_ORIGINS
        value: https://safeyouth-frontend.netlify.app,https://*.netlify.app
      
      # ============================================
      # PYTHON VERSION
      # ============================================
      - key: PYTHON_VERSION
        value: 3.11.0
      
      # ============================================
      # DATABASE CONFIGURATION (UPDATED)
      # ============================================
      # Main database connection string
      - key: DATABASE_URL
        value: postgresql://safeyouth_user:frbrf5yYIjHwr2W9XoRrRA8wj2gFhWWw@dpg-d8crdak2m8qs73e24fng-a.oregon-postgres.render.com/safeyouth_db
      
      # Individual database variables (fallback)
      - key: DB_HOST
        value: dpg-d8crdak2m8qs73e24fng-a.oregon-postgres.render.com
      
      - key: DB_NAME
        value: safeyouth_db
      
      - key: DB_USER
        value: safeyouth_user
      
      - key: DB_PASSWORD
        value: frbrf5yYIjHwr2W9XoRrRA8wj2gFhWWw
      
      - key: DB_PORT
        value: 5432
      
      # ============================================
      # FIREBASE CONFIGURATION
      # ============================================
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false  # Set this manually in Render dashboard
      
      - key: FIREBASE_STORAGE_BUCKET
        value: safeyouth-ai.firebasestorage.app
      
      # ============================================
      # AI APIs
      # ============================================
      - key: GEMINI_API_KEY
        sync: false  # Set this manually in Render dashboard
      
      - key: OPENAI_API_KEY
        sync: false  # Optional - set if using OpenAI
      
      # ============================================
      # GOOGLE MAPS API
      # ============================================
      - key: GOOGLE_MAPS_API_KEY
        sync: false  # Set this manually in Render dashboard
      
      # ============================================
      # EMAIL CONFIGURATION
      # ============================================
      - key: EMAIL_HOST_USER
        sync: false  # Set your email
      
      - key: EMAIL_HOST_PASSWORD
        sync: false  # Set your app password
      
      - key: DEFAULT_FROM_EMAIL
        value: noreply@safeyouth.com
      
      - key: EMAIL_HOST
        value: smtp.gmail.com
      
      - key: EMAIL_PORT
        value: 587
      
      - key: EMAIL_USE_TLS
        value: True
      
      # ============================================
      # SMS CONFIGURATION (Africa's Talking)
      # ============================================
      - key: AFRICAS_TALKING_API_KEY
        sync: false
      
      - key: AFRICAS_TALKING_USERNAME
        sync: false
      
      - key: SMS_SENDER_ID
        value: SafeYouthAI
      
      # ============================================
      # LOGGING
      # ============================================
      - key: LOG_LEVEL
        value: INFO
      
      # ============================================
      # SENTRY MONITORING (Optional)
      # ============================================
      # - key: SENTRY_DSN
      #   sync: false
      
      # ============================================
      # ENVIRONMENT
      # ============================================
      - key: ENVIRONMENT
        value: production
      
      # ============================================
      # COUNSELOR EMAIL
      # ============================================
      - key: COUNSELOR_EMAIL
        value: counselor@safeyouth.com

# ============================================
# POSTGRESQL DATABASE SERVICE (Uncomment to create)
# ============================================
# - type: postgresql
#   name: safeyouth-db
#   plan: free
#   region: oregon
#   databaseName: safeyouth_db
#   user: safeyouth_user
#   ipAllowList: []  # Allow all connections (secured by password)

# ============================================
# GLOBAL SETTINGS
# ============================================
previewsEnabled: false  # Disable preview environments for free tier

